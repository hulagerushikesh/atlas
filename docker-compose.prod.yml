version: "3.9"

# Production compose — includes Prometheus + Grafana on top of the base stack.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Grafana UI: http://localhost:3000  (admin / admin on first run)
# Prometheus:  http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: atlas_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - atlas_api
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:10.4.3
    container_name: atlas_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/atlas_overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

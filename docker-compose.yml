version: "3.9"

services:
  # ── Vector store ────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: atlas_qdrant
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: atlas_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Atlas API ────────────────────────────────────────────────────────────────
  atlas_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas_api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
